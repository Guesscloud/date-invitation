<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>约会邀请</title>
<style>
body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:#ffdbe8;overflow:hidden;font-family:"Microsoft YaHei",sans-serif}
.heart{position:fixed;color:#ff6aa2;animation:f 8s linear infinite}
@keyframes f{from{transform:translateY(110vh)}to{transform:translateY(-20vh)}}
.card{width:360px;background:#fff3f7;border:3px solid #f6a7c2;border-radius:24px;padding:22px;text-align:center;z-index:2;box-shadow:0 8px 25px rgba(0,0,0,.15)}
h2{color:#d95b8a}
.btn{padding:10px 22px;border:none;border-radius:20px;margin:8px;cursor:pointer}
.yes{background:#ff6aa2;color:white}
.no{background:#d98aa8;color:white;position:relative}
.page{display:none}.show{display:block}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.opt{background:white;border:2px solid #f3bfd1;border-radius:12px;padding:12px;cursor:pointer}
.sel{background:#ffd1e1}
input{padding:8px;border-radius:10px;border:1px solid #f3bfd1}
.small{color:#777;font-size:14px}
</style>
</head>
<body>

<div class="card">

<div id="p1" class="page show">
<div style="font-size:70px">🥰</div>
<h2>愿意和我一起约会吗？</h2>
<p class="small">请选择你的答案 ❤️</p>
<button class="btn yes" onclick="next(2)">愿意</button>
<button id="no" class="btn no">不要</button>
</div>

<div id="p2" class="page">
<h2>选择约会日期和时间 📅⏰</h2>
<p class="small">请选择一个你方便的时间</p>
<br>
<input type="date" id="date">
<br><br>
<input type="time" id="time" value="18:00">
<br><br>
<button class="btn yes" onclick="goStep3()">下一步</button>
</div>

<div id="p3" class="page">
<h2>想一起做什么呢？ 💞</h2>
<div class="grid">
<div class="opt">🎬 看电影</div>
<div class="opt">🍜 吃美食</div>
<div class="opt">🌹 散步</div>
<div class="opt">🎡 游乐园</div>
<div class="opt">🌊 海边</div>
<div class="opt">☕ 喝咖啡</div>
</div>
<br>
<button class="btn yes" id="continueBtn">请选择活动</button>
</div>

<div id="p4" class="page">
<h2>约会确认成功 🎉</h2>
<p id="result"></p>
<div style="font-size:60px">💖</div>
<p>期待与你见面！</p>
</div>

</div>

<script>
for(let i=0;i<40;i++){
 let d=document.createElement('div');
 d.className='heart';
 d.innerHTML='💗';
 d.style.left=Math.random()*100+'vw';
 d.style.animationDuration=(4+Math.random()*6)+'s';
 d.style.fontSize=(12+Math.random()*24)+'px';
 document.body.appendChild(d);
}

const no=document.getElementById('no');
function move(){
 no.style.position='fixed';
 no.style.left=Math.random()*(window.innerWidth-100)+'px';
 no.style.top=Math.random()*(window.innerHeight-50)+'px';
}
no.addEventListener('mouseover',move);
no.addEventListener('click',move);

let activity='';

document.querySelectorAll('.opt').forEach(o=>{
 o.onclick=()=>{
   document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
   o.classList.add('sel');
   activity=o.innerText;
   document.getElementById('continueBtn').innerText='确认选择';
 };
});

document.getElementById('continueBtn').onclick=()=>{
 if(!activity) return alert('请先选择活动');
 const date=document.getElementById('date').value;
 const time=document.getElementById('time').value;
 document.getElementById('result').innerText=
 `约会时间：${date} ${time}\n约会项目：${activity}`;
 next(4);
};

function goStep3(){
 if(!document.getElementById('date').value){
   alert('请选择日期');
   return;
 }
 next(3);
}

function next(n){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
 document.getElementById('p'+n).classList.add('show');
}
</script>
</body>
</html>
